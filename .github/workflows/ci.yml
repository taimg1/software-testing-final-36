name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: feedback
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Feedback.slnx

      - name: Build
        run: dotnet build Feedback.slnx --no-restore

      - name: Unit Tests
        run: dotnet test tests/Feedback.Api.Tests/Feedback.Api.Tests.csproj --no-build --verbosity normal

      - name: Integration Tests
        run: dotnet test tests/Feedback.Api.Tests.Integration/Feedback.Api.Tests.Integration.csproj --no-build --verbosity normal

      - name: Database Tests
        run: dotnet test tests/Feedback.Api.Tests.Database/Feedback.Api.Tests.Database.csproj --no-build --verbosity normal
